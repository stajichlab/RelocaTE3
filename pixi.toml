[workspace]
name = "RelocaTE3"
description = "Tool for identifying transposable element transposition from resequencing data"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
minimap2 = ">=2.24"
samtools = ">=1.17"
bedtools = ">=2.30"
pysam = ">=0.20"
biopython = ">=1.81"
pybedtools = "*"
pip = ">=26.1.2,<27"

[pypi-dependencies]
RelocaTE3 = { path = ".", editable = true }
sphinx = ">=7.0"

[tasks]
test = "pytest -ra -q"
docs = "sphinx-build -b html docs/source docs/_build/html"
